name: nexus

services:
  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    ports:
      - "8081:8081"
      - "8082:8082"
    volumes:
      - ./data-nexus:/data-nexus
    restart: unless-stopped
    environment:
      - NEXUS_CONTEXT_PATH=/
      # Temporary reset
      #- INSTALL4J_ADD_VM_PARAMS=-Dcom.sonatype.nexus.bootstrap.password=admin123
